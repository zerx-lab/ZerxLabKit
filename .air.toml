root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server.exe ./cmd/server"
  bin = "tmp\\server.exe"
  include_ext = ["go"]
  exclude_dir = ["web", "gen", "proto", "internal/web/dist", "tmp", "bin", ".bin", ".git", ".deps-snapshot", "testdata"]
  exclude_regex = ["_test\\.go"]
  delay = 1000
  send_interrupt = false
  kill_delay = "2s"
  stop_on_error = true

[misc]
  clean_on_exit = false
