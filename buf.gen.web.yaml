version: v2
clean: true
inputs:
  - directory: proto
plugins:
  # TypeScript message types (protobuf-es v2; service descriptors inlined here).
  - local: ["node", "./web/node_modules/@bufbuild/protoc-gen-es/bin/protoc-gen-es"]
    out: web/src/gen
    opt:
      - target=ts
      - import_extension=none
  # TypeScript connect-query hooks.
  - local: ["node", "./web/node_modules/@connectrpc/protoc-gen-connect-query/bin/protoc-gen-connect-query"]
    out: web/src/gen
    opt:
      - target=ts
      - import_extension=none
