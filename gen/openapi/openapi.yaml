tags:
  - name: zerx.v1.ApiService
    description: ApiService manages the catalog of connectRPC procedures used for RBAC.
  - name: zerx.v1.UserService
    description: |-
      UserService manages user accounts. Authorization is enforced by the Casbin
       interceptor (admin bypasses); handlers carry no role checks.
  - name: zerx.v1.AuthService
    description: |-
      AuthService handles authentication and session management. Login, Register,
       Refresh and GetCaptcha are public; the session and self-serve RPCs require a
       valid access token.
  - name: zerx.v1.DashboardService
    description: |-
      DashboardService exposes aggregate statistics for the admin dashboard.
       Authorization is enforced by the Casbin interceptor (admin bypasses).
  - name: zerx.v1.DictService
    description: DictService manages lookup dictionaries. GetDictByType is self-serve.
  - name: zerx.v1.FileService
    description: |-
      FileService lists and deletes uploaded files. Uploading itself is a plain
       multipart HTTP endpoint at /api/upload (not a connectRPC method).
  - name: zerx.v1.JobService
    description: |-
      JobService manages cron-scheduled jobs. Authorization is enforced by the
       Casbin interceptor (admin bypasses); handlers carry no role checks.
  - name: zerx.v1.LogService
    description: |-
      LogService exposes operation, error (operation rows with non-ok status), and
       login logs.
  - name: zerx.v1.MenuService
    description: |-
      MenuService manages the navigation tree and button permissions. GetUserMenus
       and GetUserButtons are self-serve; the rest are Casbin-gated.
  - name: zerx.v1.SysParamService
    description: SysParamService manages runtime system parameters.
  - name: zerx.v1.PluginService
    description: |-
      PluginService exposes the compiled-in plugin registry and runtime enable/
       disable state. Compile-time plugins cannot be installed/uninstalled at
       runtime (that needs a rebuild); enable/disable is a runtime gate that hides a
       plugin's menus, denies its procedures, and skips its jobs. Admin-only.
  - name: zerx.v1.RoleService
    description: |-
      RoleService manages RBAC roles and their permission assignments. Authorization
       is enforced by the Casbin interceptor (admin bypasses).
  - name: zerx.v1.ShopProductService
    description: |-
      ShopProductService is the example plugin's product CRUD. Provided by the
       "shop" plugin (internal/plugin/impl/shop); guarded by Casbin like any core
       service.
  - name: zerx.v1.ShopCategoryService
    description: |-
      ShopCategoryService is the second sub-page of the grouped "shop" plugin,
       demonstrating a one-group / multiple-sub-page navigation layout.
  - name: zerx.v1.SiteSettingsService
    description: |-
      SiteSettingsService manages site-wide presentation settings (name, logo,
       access domain), stored as fixed-key system parameters.
