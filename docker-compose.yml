services:
  app:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
    ports:
      - "8080:8080"
    restart: on-failure
    environment:
      APP_ENV: prod
      # Default stack uses PostgreSQL. To use MySQL instead: uncomment the mysql
      # service and the mysqldata volume at the bottom, switch the two lines
      # below to the mysql values, and point depends_on at mysql:
      #   DB_DRIVER: mysql
      #   DB_DSN: zerx:zerx@tcp(mysql:3306)/zerxlab?charset=utf8mb4&parseTime=True&loc=Local
      DB_DRIVER: postgres
      DB_DSN: host=postgres user=zerx password=zerx dbname=zerxlab port=5432 sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-please-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zerx
      POSTGRES_PASSWORD: zerx
      POSTGRES_DB: zerxlab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerx -d zerxlab"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional MySQL — disabled by default. To enable: uncomment this service and
  # the mysqldata volume below, set the app's DB_DRIVER/DB_DSN to the mysql
  # values shown above, and change the app's depends_on to wait for mysql
  # (mysql: { condition: service_healthy }).
  # mysql:
  #   image: mysql:8.4
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: rootpw
  #     MYSQL_DATABASE: zerxlab
  #     MYSQL_USER: zerx
  #     MYSQL_PASSWORD: zerx
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysqldata:/var/lib/mysql
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uzerx", "-pzerx"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 10

  # Optional MinIO (S3-compatible object storage) — disabled by default. To
  # enable: uncomment this service and the miniodata volume below, then set the
  # app environment to STORAGE_DRIVER=s3 with STORAGE_S3_ENDPOINT=minio:9000,
  # STORAGE_S3_ACCESS_KEY/SECRET_KEY=minioadmin, STORAGE_S3_BUCKET=zerxlab,
  # STORAGE_S3_SECURE=false (create the bucket first via the console at :9001).
  # minio:
  #   image: minio/minio:latest
  #   restart: unless-stopped
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   volumes:
  #     - miniodata:/data
  #   healthcheck:
  #     test: ["CMD", "mc", "ready", "local"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 10

volumes:
  # Named explicitly (project-prefixed) so they don't collide with generic
  # "pgdata"/"mysqldata" volumes from other compose projects.
  pgdata:
    name: zerxlabkit_pgdata
  # mysqldata:
  #   name: zerxlabkit_mysqldata
  # miniodata:
  #   name: zerxlabkit_miniodata
