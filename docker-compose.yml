services:
  app:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
    ports:
      - "8080:8080"
    environment:
      APP_ENV: prod
      # Switch DB_DRIVER to mysql + the mysql DSN below to use MySQL instead.
      DB_DRIVER: ${DB_DRIVER:-postgres}
      DB_DSN: ${DB_DSN:-host=postgres user=zerx password=zerx dbname=zerxlab port=5432 sslmode=disable}
      # MySQL DSN (when DB_DRIVER=mysql):
      #   zerx:zerx@tcp(mysql:3306)/zerxlab?charset=utf8mb4&parseTime=True&loc=Local
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-please-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: zerx
      POSTGRES_PASSWORD: zerx
      POSTGRES_DB: zerxlab
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerx -d zerxlab"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: zerxlab
      MYSQL_USER: zerx
      MYSQL_PASSWORD: zerx
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uzerx", "-pzerx"]
      interval: 5s
      timeout: 3s
      retries: 10
