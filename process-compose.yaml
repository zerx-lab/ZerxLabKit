# Dev process runner with a TUI (like turborepo's runner).
# Launch via `task dev` — it sets ZERX_AIR to the platform air binary and opens
# the process-compose TUI. In the TUI: select a process with ↑/↓, F5 restart,
# F9 stop, F7 start, F10 quit; the logs pane shows the focused process.
version: "0.5"

processes:
  backend:
    # ZERX_AIR is injected by `task dev` (./.bin/air[.exe]); air rebuilds the
    # Go server on every .go change (hot reload).
    command: "${ZERX_AIR}"
    availability:
      restart: "on_failure"
      backoff_seconds: 2

  frontend:
    command: "pnpm -C web dev"
    availability:
      restart: "on_failure"
      backoff_seconds: 2
