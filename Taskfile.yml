version: "3"

vars:
  BIN: 'bin/zerxlabkit{{if eq OS "windows"}}.exe{{end}}'
  GOBIN: "{{.ROOT_DIR}}/.bin"
  MODULE: github.com/zerx-lab/zerxlabkit

includes:
  backend: { taskfile: ./taskfiles/backend.yml, dir: "{{.ROOT_DIR}}" }
  frontend: { taskfile: ./taskfiles/frontend.yml, dir: "{{.ROOT_DIR}}" }
  proto: { taskfile: ./taskfiles/proto.yml, dir: "{{.ROOT_DIR}}" }
  db: { taskfile: ./taskfiles/db.yml, dir: "{{.ROOT_DIR}}" }
  deps: { taskfile: ./taskfiles/deps.yml, dir: "{{.ROOT_DIR}}" }
  docker: { taskfile: ./taskfiles/docker.yml, dir: "{{.ROOT_DIR}}" }

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  sync:
    desc: One-shot setup — install tools/deps, generate code, create .env, start dev DB
    cmds:
      - task: backend:tools
      - task: frontend:install
      - task: proto:dep
      - task: gen
      - go mod tidy
      - task: env:ensure
      - task: db:up

  env:ensure:
    internal: true
    silent: true
    cmds:
      - cmd: '[ -f .env ] || cp .env.example .env'

  gen:
    desc: Generate all code (proto + db query) into committed source
    cmds:
      - task: proto:gen
      - task: db:gen

  dev:backend:
    desc: Run the backend in the foreground (Ctrl+C to stop). No hot reload — rerun to pick up changes.
    deps: [env:ensure, db:up]
    cmds:
      - task: backend:dev

  dev:web:
    desc: Run the Vite dev server in the foreground (Ctrl+C to stop). Proxies :5173 -> backend :8080.
    cmds:
      - task: frontend:dev

  build:
    desc: Build the SPA, then the native server binary that embeds it
    cmds:
      - task: frontend:build
      - task: backend:build

  build:dist:
    desc: Build the SPA, then a static linux/amd64 binary for deployment
    cmds:
      - task: frontend:build
      - task: backend:build:linux

  lint:
    desc: Lint backend (golangci-lint + nilaway) and frontend (eslint + tsc)
    cmds:
      - task: backend:lint
      - task: frontend:lint

  test:
    desc: Run backend and frontend tests
    cmds:
      - task: backend:test
      - task: frontend:test

  run:
    desc: Run the built server binary (requires JWT_SECRET; .env suffices in dev)
    cmds:
      - "{{.BIN}}"

  new-plugin:
    desc: 'Scaffold a plugin (proto+impl+web+all.go). Usage: task new-plugin -- <name> [field:type,...]'
    cmds:
      - task: backend:new-plugin

  plugin-pack:
    desc: 'Pack an installed plugin into a distributable <name>.zip. Usage: task plugin-pack -- <name>'
    cmds:
      - task: backend:plugin-pack

  new:
    desc: 'Scaffold a new project from this template (rename module/brand/db). Usage: task new -- github.com/acme/foo ../foo [--brand Foo] [--db foo]'
    cmds:
      - go run ./cmd/zerxKit new {{.CLI_ARGS}} --from {{.ROOT_DIR}}
