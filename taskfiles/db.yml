version: "3"

vars:
  GORM: '{{.ROOT_DIR}}/.bin/gorm{{if eq OS "windows"}}.exe{{end}}'

tasks:
  gen:
    desc: Generate the type-safe GORM query package (internal/query)
    cmds:
      - "{{.GORM}} gen -i ./internal/model -o ./internal/query"

  up:
    desc: Start the local dev PostgreSQL and wait until it is ready
    cmds:
      - docker compose up -d --wait postgres

  down:
    desc: Stop the local dev PostgreSQL container
    cmds:
      - docker compose stop postgres
