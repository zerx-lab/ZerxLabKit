version: "3"

tasks:
  dep:
    desc: Resolve buf dependencies into buf.lock
    cmds:
      - buf dep update

  gen:
    desc: Generate Go (gen/go) and TS (web/src/gen) from proto
    cmds:
      # Go: handlers + messages (no --include-imports; protovalidate comes from the Go module)
      - buf generate
      # TS: messages + connect-query hooks, including the protovalidate descriptor
      - buf generate --template buf.gen.web.yaml --include-imports
      # Copy the OpenAPI spec into the server package for go:embed
      - cmd: cp gen/openapi/openapi.yaml internal/server/openapi.yaml
        platforms: [linux, darwin]
      - cmd: powershell -Command "Copy-Item gen/openapi/openapi.yaml internal/server/openapi.yaml -Force"
        platforms: [windows]
