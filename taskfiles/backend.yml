version: "3"

vars:
  GOBIN: "{{.ROOT_DIR}}/.bin"
  BIN: 'bin/zerxlabkit{{if eq OS "windows"}}.exe{{end}}'
  MODULE: github.com/zerx-lab/zerxlabkit
  AIR: '{{.ROOT_DIR}}/.bin/air{{if eq OS "windows"}}.exe{{end}}'

tasks:
  tools:
    desc: Install local Go tools (air, gorm cli) into .bin; verify system buf
    env:
      GOBIN: "{{.GOBIN}}"
    cmds:
      - cmd: 'command -v buf >/dev/null 2>&1 || (echo "ERROR: buf not found. Install from https://buf.build/docs/installation" && exit 1)'
        silent: true
      - go install github.com/air-verse/air@latest
      - go install gorm.io/cli/gorm@latest

  dev:
    desc: Run the server with hot reload via air
    cmds:
      - "{{.AIR}}"

  build:
    desc: Build the native server binary (CGO-free; embeds the SPA)
    env:
      CGO_ENABLED: "0"
    cmds:
      - go build -trimpath -ldflags "-s -w -X main.version={{.VERSION | default "dev"}}" -o {{.BIN}} ./cmd/server

  build:linux:
    desc: Build a static linux/amd64 binary (netgo,osusergo; no glibc)
    env:
      CGO_ENABLED: "0"
      GOOS: linux
      GOARCH: amd64
    cmds:
      - go build -trimpath -tags netgo,osusergo -ldflags "-s -w -X main.version={{.VERSION | default "dev"}}" -o bin/zerxlabkit-linux-amd64 ./cmd/server

  lint:
    desc: Run golangci-lint and nilaway (generated code excluded)
    cmds:
      - go tool golangci-lint run
      - go tool nilaway -include-pkgs={{.MODULE}} -exclude-pkgs={{.MODULE}}/gen,{{.MODULE}}/internal/query ./...

  test:
    desc: Run Go tests
    cmds:
      - go test ./...
