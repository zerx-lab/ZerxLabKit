syntax = "proto3";

package zerx.v1;

option go_package = "github.com/zerx-lab/zerxlabkit/gen/go/zerx/v1;zerxv1";

// PageRequest is a reusable pagination request fragment.
message PageRequest {
  int32 page = 1;
  int32 page_size = 2;
}

// PageResponse is a reusable pagination response fragment.
message PageResponse {
  int64 total = 1;
}
