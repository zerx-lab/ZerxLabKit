syntax = "proto3";

package zerx.v1;

import "buf/validate/validate.proto";
import "zerx/v1/user.proto";

option go_package = "github.com/zerx-lab/zerxlabkit/gen/go/zerx/v1;zerxv1";

// AuthService handles authentication. Login and Refresh are public.
service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  rpc Me(MeRequest) returns (MeResponse);
}

message LoginRequest {
  string email = 1 [(buf.validate.field).string.email = true];
  string password = 2 [(buf.validate.field).string.min_len = 8];
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message RefreshRequest {
  string refresh_token = 1 [(buf.validate.field).string.min_len = 1];
}

message RefreshResponse {
  string access_token = 1;
}

message MeRequest {}

message MeResponse {
  User user = 1;
}
