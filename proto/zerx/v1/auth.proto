syntax = "proto3";

package zerx.v1;

import "buf/validate/validate.proto";
import "zerx/v1/user.proto";

option go_package = "github.com/zerx-lab/zerxlabkit/gen/go/zerx/v1;zerxv1";

// AuthService handles authentication and session management. Login, Register,
// Refresh and GetCaptcha are public; the session and self-serve RPCs require a
// valid access token.
service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  // Register creates an account. The very first registered user becomes admin.
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  // Logout revokes every session of the current user (logout everywhere).
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc Me(MeRequest) returns (MeResponse);
  rpc GetCaptcha(GetCaptchaRequest) returns (GetCaptchaResponse);
  // ListSessions returns the caller's sessions; admins may pass a user_id.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  // RevokeSession deletes one session (own session, or any when admin).
  rpc RevokeSession(RevokeSessionRequest) returns (RevokeSessionResponse);
  // ChangePassword changes the caller's own password (self-serve).
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  // UpdateProfile updates the caller's own profile fields (self-serve).
  rpc UpdateProfile(UpdateProfileRequest) returns (User);
  // RequestPasswordReset emails a reset link (public; no enumeration).
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (RequestPasswordResetResponse);
  // ConfirmPasswordReset sets a new password using an emailed token (public).
  rpc ConfirmPasswordReset(ConfirmPasswordResetRequest) returns (ConfirmPasswordResetResponse);
  // SetupTotp begins 2FA enrollment, returning a secret + QR (self-serve).
  rpc SetupTotp(SetupTotpRequest) returns (SetupTotpResponse);
  // ActivateTotp confirms 2FA and returns recovery codes (self-serve).
  rpc ActivateTotp(ActivateTotpRequest) returns (ActivateTotpResponse);
  // DisableTotp turns off the caller's 2FA (self-serve).
  rpc DisableTotp(DisableTotpRequest) returns (DisableTotpResponse);
}

message LoginRequest {
  string email = 1 [(buf.validate.field).string.email = true];
  string password = 2 [(buf.validate.field).string.min_len = 8];
  string captcha_id = 3;
  string captcha_code = 4;
  string totp_code = 5;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
  string session_id = 4;
  bool totp_required = 5;
}

message RegisterRequest {
  string email = 1 [(buf.validate.field).string.email = true];
  string name = 2 [(buf.validate.field).string.min_len = 1];
  string password = 3 [(buf.validate.field).string.min_len = 8];
}

message RegisterResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
  string session_id = 4;
}

message RefreshRequest {
  string refresh_token = 1 [(buf.validate.field).string.min_len = 1];
}

message RefreshResponse {
  string access_token = 1;
}

message LogoutRequest {}

message LogoutResponse {}

message MeRequest {}

message MeResponse {
  User user = 1;
}

message GetCaptchaRequest {}

message GetCaptchaResponse {
  string captcha_id = 1;
  // image_base64 is a base64-encoded PNG data URL.
  string image_base64 = 2;
}

message Session {
  string id = 1;
  uint64 user_id = 2;
  string ip = 3;
  string user_agent = 4;
  string created_at = 5;
  string last_seen_at = 6;
}

// ListSessionsRequest: user_id 0 means "the caller". Non-zero requires admin.
message ListSessionsRequest {
  uint64 user_id = 1;
}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message RevokeSessionRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message RevokeSessionResponse {}

message ChangePasswordRequest {
  string old_password = 1 [(buf.validate.field).string.min_len = 1];
  string new_password = 2 [(buf.validate.field).string.min_len = 8];
}

message ChangePasswordResponse {}

message UpdateProfileRequest {
  string nickname = 1;
  string avatar = 2;
  string phone = 3;
}

message RequestPasswordResetRequest {
  string email = 1 [(buf.validate.field).string.email = true];
}

message RequestPasswordResetResponse {}

message ConfirmPasswordResetRequest {
  string token = 1 [(buf.validate.field).string.min_len = 1];
  string new_password = 2 [(buf.validate.field).string.min_len = 8];
}

message ConfirmPasswordResetResponse {}

message SetupTotpRequest {}

message SetupTotpResponse {
  string secret = 1;
  string qr_image_base64 = 2;
}

message ActivateTotpRequest {
  string code = 1 [(buf.validate.field).string.min_len = 6];
}

message ActivateTotpResponse {
  repeated string recovery_codes = 1;
}

message DisableTotpRequest {
  string code = 1 [(buf.validate.field).string.min_len = 1];
}

message DisableTotpResponse {}
